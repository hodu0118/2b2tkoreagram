<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Koreagram</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>📸 Koreagram</h1>
</header>

<div class="upload">

<input id="username" placeholder="닉네임">
<input id="title" placeholder="제목">
<input type="file" id="imageFile">
<textarea id="desc" placeholder="설명"></textarea>

<select id="tag">
<option>Base</option>
<option>War</option>
<option>Discovery</option>
<option>Meme</option>
</select>

<button onclick="createPost()">Post</button>

</div>

<div id="feed"></div>

<script src="script.js"></script>

</body>
</html>
